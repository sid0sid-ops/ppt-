<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BioAlign-Pro | Presentation by Siddharth Tripathi</title>
  <meta name="description" content="Presentation by Siddharth Tripathi.">
  <meta name="author" content="Siddharth Tripathi">

  <link rel="icon" type="image/png" href="favicon.png">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@700;800;900&family=Outfit:wght@700;800;900&family=Fira+Code:wght@400;500;700&family=Roboto:wght@400;500;700&display=swap"
    rel="stylesheet">

  <!-- FontAwesome for Icons (crossorigin avoids tracking-prevention storage warnings) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    crossorigin="anonymous" referrerpolicy="no-referrer">

  <!-- Removed Three.js to use static molecular background -->

  <!-- Global Styles -->
  <link rel="stylesheet" href="./assets_global/css/base.css">
  <link rel="stylesheet" href="./assets_global/css/tailwind-build.css">
  <link rel="stylesheet" href="./assets_global/css/components.css">
  <link rel="stylesheet" href="./assets_global/css/animations.css">

  <!-- Theme Initialization Script (Must remain in HEAD to prevent FOUC) -->
  <script>
    // Check local storage or system preference
    if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    } else {
      document.documentElement.classList.remove('dark');
    }

    // Global toggle function
    window.toggleTheme = function () {
      document.documentElement.classList.toggle('dark');
      const isDark = document.documentElement.classList.contains('dark');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');

      if (window.engine && window.engine.broadcastChannel) {
        window.engine.broadcastChannel.postMessage({ action: 'THEME', isDark });
      }

      const themeIcons = document.querySelectorAll('.themeIcon');
      themeIcons.forEach(icon => {
        if (isDark) {
          icon.classList.remove('fa-moon');
          icon.classList.add('fa-sun');
        } else {
          icon.classList.remove('fa-sun');
          icon.classList.add('fa-moon');
        }
      });
    };
  </script>
</head>

<body id="bodyRoot"
  class="bg-background text-black dark:text-white min-h-screen flex flex-col font-sans antialiased overflow-x-hidden">

  <!-- Navigation / Header -->
  <nav
    class="sticky top-0 z-50 bg-background/80 backdrop-blur-lg border-b border-border px-6 py-4 flex items-center justify-between shadow-sm relative">
    <div class="flex items-center gap-3">
      <div class="flex flex-col">
        <span class="text-[9px] font-mono text-muted tracking-widest uppercase leading-none mb-1">Presentation
          Dashboard</span>
        <h1 class="text-xl font-bold tracking-tight leading-none pt-0 mt-0 text-black dark:text-white mb-1">
          BioAlign<span id="proText" class="text-black dark:text-white transition-colors duration-300">-Pro</span>
        </h1>
        <span class="text-[0.6rem] italic text-muted font-serif tracking-wide leading-relaxed animate-motto">
          "Where chemicals became so advanced that they started studying themselves."
        </span>
      </div>
    </div>
    <div class="flex items-center gap-4 text-sm font-medium text-muted">
      <button onclick="toggleTheme()"
        class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-black/10 dark:hover:bg-white/10 transition-colors focus:outline-none bg-surface/50 backdrop-blur"
        title="Toggle Light/Dark Theme">
        <i class="themeIcon fa-solid fa-moon text-black dark:text-white"></i>
      </button>
      <div class="hidden md:flex items-center gap-4">
        <a href="https://sid0sid-ops.github.io/BioAlign-Pro-Homepage/"
          class="flex items-center gap-2 px-3 py-1 hover:bg-black/5 dark:hover:bg-white/10 hover:text-black dark:hover:text-white rounded-full transition-colors focus:outline-none"
          title="Home">
          <i class="fa-solid fa-house"></i> Home
        </a>
        <a href="https://sid0sid-ops.github.io/BioAlign-Pro-Contact/"
          class="px-3 py-1 bg-surface hover:bg-black/5 dark:hover:bg-white/10 text-black dark:text-white rounded-full transition-colors border border-border">Contact</a>
      </div>

      <!-- Mobile Hamburger Menu Toggle -->
      <button id="mobileMenuBtn" onclick="document.getElementById('mobileMenu').classList.toggle('hidden')"
        class="md:hidden w-8 h-8 flex items-center justify-center rounded-full hover:bg-black/10 dark:hover:bg-white/10 transition-colors focus:outline-none text-black dark:text-white bg-surface/50 backdrop-blur">
        <i class="fa-solid fa-bars text-lg"></i>
      </button>

      <!-- Mobile Menu Dropdown -->
      <div id="mobileMenu"
        class="hidden absolute top-full mt-2 right-4 w-48 bg-surface/95 backdrop-blur-xl border border-border rounded-xl shadow-xl flex flex-col py-2 z-50 animate-slide-up">
        <a href="https://sid0sid-ops.github.io/BioAlign-Pro-Homepage/"
          class="w-full text-left px-4 py-3 text-black dark:text-white hover:bg-black/5 dark:hover:bg-white/10 transition-colors flex items-center gap-3 font-semibold bg-black/5 dark:bg-white/10">
          <i class="fa-solid fa-house w-4"></i> Home
        </a>
        <div class="h-px bg-border w-full my-1"></div>
        <a href="https://sid0sid-ops.github.io/BioAlign-Pro-Contact/"
          class="w-full text-left px-4 py-3 text-black dark:text-white hover:bg-black/5 dark:hover:bg-white/10 transition-colors flex items-center gap-3">
          <i class="fa-solid fa-envelope w-4"></i> Contact
        </a>
      </div>
    </div>
  </nav>

  <!-- Central State & Router Container -->
  <main id="appRoot" class="flex-grow flex flex-col relative w-full h-full animate-fade-in relative">

    <!-- 1. PRESENTATION DASHBOARD -->
    <div id="view-dashboard" class="w-full h-full p-6 flex flex-col transition-opacity">
      <header class="flex justify-between items-center mb-6">
        <div class="flex gap-4">
          <button class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 transition flex items-center gap-2"
            onclick="window.engine.setSlide(0); window.enterStage()">
            <i class="fa-solid fa-play"></i> Start Full Presentation
          </button>
        </div>
      </header>

      <section class="flex-grow grid grid-cols-12 gap-6 relative">
        <style>
          .pipeline-scroll::-webkit-scrollbar {
            width: 6px;
          }

          .pipeline-scroll::-webkit-scrollbar-track {
            background: transparent;
          }

          /* Dark theme */
          html.dark .pipeline-scroll::-webkit-scrollbar-thumb {
            background-color: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
          }

          html.dark .pipeline-scroll:hover::-webkit-scrollbar-thumb {
            background-color: rgba(255, 255, 255, 0.4);
          }

          html.dark .pipeline-scroll {
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 255, 255, 0.2) transparent;
          }

          /* Light theme */
          html:not(.dark) .pipeline-scroll::-webkit-scrollbar-thumb {
            background-color: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
          }

          html:not(.dark) .pipeline-scroll:hover::-webkit-scrollbar-thumb {
            background-color: rgba(0, 0, 0, 0.3);
          }

          html:not(.dark) .pipeline-scroll {
            scrollbar-width: thin;
            scrollbar-color: rgba(0, 0, 0, 0.3) transparent;
          }
        </style>
        <aside class="col-span-12 md:col-span-3 glass-panel p-4 flex flex-col gap-4 overflow-y-auto pipeline-scroll"
          style="max-height: calc(100vh - 150px);">
          <h2 class="text-xl font-semibold mb-2 text-black dark:text-white border-b border-border pb-2">Slide Pipeline
          </h2>
          <div id="slide-thumbnails-container" class="flex flex-col gap-3">
            <div class="text-muted text-sm italic">Loading slides...</div>
          </div>
        </aside>

        <main
          class="col-span-12 md:col-span-9 glass-panel p-6 relative overflow-hidden flex flex-col items-center justify-center">
          <div class="w-full mb-4 flex justify-between items-center text-sm font-semibold text-muted tracking-wide">
            <span>PREVIEW WINDOW</span>
            <span id="preview-slide-indicator">Slide 1/14</span>
          </div>
          <div id="dashboard-main-preview"
            class="w-full max-w-[1200px] aspect-video border border-border shadow-2xl relative overflow-hidden bg-background rounded-lg cursor-pointer"
            onclick="window.enterStage()">
          </div>
        </main>
      </section>
    </div>

    <!-- 2. PRESENTATION STAGE (Hidden) -->
    <div id="view-stage" class="hidden"
      style="position: fixed; inset: 0; z-index: 200; width: 100vw; height: 100vh; margin: 0; padding: 0; background: transparent; overflow: hidden;">
      <div id="slide-injection-point" style="position: absolute; inset: 0; width: 100%; height: 100%;"></div>
    </div>

    <!-- 3. PRESENTER HUD (Hidden) -->
    <div id="view-presenter"
      class="hidden absolute inset-0 z-[300] w-full h-screen flex bg-gray-50 dark:bg-[#1a1a1a] text-black dark:text-white overflow-hidden"
      style="font-family: 'Inter', sans-serif;">
      <!-- LEFT PANEL -->
      <div class="w-[65%] h-full flex flex-col p-4 pr-2 relative z-10">
        <div class="flex justify-between items-center text-xs font-semibold text-gray-400 mb-2 px-1 tracking-wide">
          <div class="flex items-center gap-6">
            <span id="session-timer" class="text-sm tracking-widest text-gray-600 dark:text-[#d1d5db]">0:00:00</span>
            <button onclick="window.toggleTheme()"
              class="icon-btn border-[1.5px] border-gray-400 p-[1px] box-content hover:text-black hover:border-black dark:hover:text-white dark:hover:border-white transition-colors"
              title="Toggle Light/Dark Theme">
              <i class="fa-solid fa-moon themeIcon text-[10px] w-4 h-4 flex items-center justify-center"></i>
            </button>
            <button onclick="window.exitPresentation()"
              class="icon-btn border-[1.5px] border-gray-400 p-[1px] box-content hover:text-black hover:border-black dark:hover:text-white dark:hover:border-white transition-colors"
              title="Exit Presentation Setup">
              <svg class="w-4 h-4 block" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
              </svg>
            </button>
          </div>
          <span id="system-clock" class="text-sm">--:-- --</span>
        </div>
        <div
          class="flex-1 bg-gray-200 dark:bg-black w-full flex items-center justify-center relative overflow-hidden rounded-lg shadow-inner">
          <div id="hud-main-container" class="w-full h-full flex items-center justify-center relative"></div>
        </div>
        <div class="h-16 flex items-center justify-center text-gray-400 mt-2">
          <div class="flex items-center gap-4 relative">
            <button id="btnPrevHUD"
              class="w-9 h-9 flex items-center justify-center rounded-full border border-gray-600 hover:bg-gray-700 hover:border-gray-500 transition"><svg
                class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
              </svg></button>
            <div class="flex flex-col items-center justify-center w-32">
              <span id="hud-slide-label" class="text-xs text-gray-400 font-medium">Slide 1 of 14</span>
            </div>
            <button id="btnNextHUD"
              class="w-9 h-9 flex items-center justify-center rounded-full border border-gray-600 hover:bg-gray-700 hover:border-gray-500 transition"><svg
                class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
              </svg></button>
          </div>
        </div>
      </div>
      <!-- RIGHT PANEL -->
      <div class="w-[35%] h-full border-l border-gray-300 dark:border-[#333] flex flex-col p-4 relative z-10">
        <div class="h-[35%] flex flex-col mb-4 min-h-[220px]">
          <span id="hud-next-label" class="text-sm text-gray-500 dark:text-gray-400 tracking-wide block mb-2">Next
            slide</span>
          <div
            class="flex-1 bg-gray-200 dark:bg-black w-full flex items-center justify-center relative rounded-lg border border-gray-300 dark:border-[#333] overflow-hidden">
            <div id="hud-next-container" class="w-full h-full flex items-center justify-center text-[8px] opacity-90">
            </div>
          </div>
        </div>
        <div class="w-full border-b border-gray-300 dark:border-[#333] my-2"></div>
        <div class="flex-1 flex flex-col relative pb-8 min-h-0">
          <div class="flex items-center gap-2 mb-2 pt-2 shrink-0">
            <i class="fa-solid fa-microphone text-[10px] text-blue-400"></i>
            <span class="text-xs text-gray-400 dark:text-[#a3a3a3] tracking-wide font-semibold uppercase">Speaker
              Notes</span>
            <span class="ml-auto text-[10px] text-gray-400 italic">Scroll ↓ for more</span>
          </div>
          <div id="hud-notes-content"
            class="flex-1 min-h-0 overflow-y-auto text-xl leading-relaxed text-gray-800 dark:text-[#f5f5f5] select-text p-3 rounded-lg bg-white/40 dark:bg-white/5 border border-gray-200 dark:border-white/10 hud-notes-scroll">
          </div>
          <div
            class="absolute bottom-0 left-0 w-full flex gap-4 text-gray-500 dark:text-[#a3a3a3] pt-4 bg-gray-50 dark:bg-[#1a1a1a]">
            <button id="btn-font-dec"
              class="hover:text-white transition-colors cursor-pointer text-sm font-serif">A-</button>
            <button id="btn-font-inc"
              class="hover:text-white transition-colors cursor-pointer text-lg font-serif">A+</button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Global scripts -->
  <script type="module" src="./assets_global/js/core/app.js"></script>
  <script>
    // Set initial icon on load without FOUC
    document.addEventListener("DOMContentLoaded", () => {
      const isDark = document.documentElement.classList.contains('dark');
      const themeIcons = document.querySelectorAll('.themeIcon');
      themeIcons.forEach(icon => {
        if (isDark) {
          icon.classList.remove('fa-moon');
          icon.classList.add('fa-sun');
        }
      });
    });
  </script>
</body>

</html>
