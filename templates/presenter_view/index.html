<div class="fixed inset-0 z-[100] w-full h-[100vh] flex bg-[#1a1a1a] text-white overflow-hidden"
    style="font-family: 'Inter', sans-serif;">
    <!-- LEFT PANEL: Primary Slide Preview -->
    <div class="w-[65%] h-full flex flex-col p-4 pr-2">
        <!-- Top Info Bar -->
        <div class="flex justify-between items-center text-xs font-semibold text-gray-400 mb-2 px-1 tracking-wide">
            <div class="flex items-center gap-6">
                <span id="session-timer" class="text-sm tracking-widest text-[#d1d5db]">0:00:00</span>
                <div class="flex gap-4">
                    <svg class="w-4 h-4 icon-btn border-[1.5px] border-gray-400 p-[1px] box-content cursor-pointer hover:text-white"
                        fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M10 9v6m4-6v6"></path>
                    </svg>
                </div>
            </div>
            <span id="system-clock" class="text-sm">--:-- --</span>
        </div>

        <!-- Main Slide Display -->
        <div
            class="flex-1 bg-black w-full h-full flex items-center justify-center relative overflow-hidden rounded-lg shadow-inner">
            <div id="main-slide-container"
                class="w-full h-full flex items-center justify-center bg-white text-black relative">
                <div class="text-slate-400 text-sm">Loading Main Preview...</div>
            </div>
        </div>

        <!-- Bottom Controls Bar -->
        <div class="h-16 flex items-center justify-between text-gray-400 mt-2">
            <!-- Left Tools -->
            <div class="flex gap-4 items-center cursor-pointer">
                <svg class="w-5 h-5 hover:text-white transition" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z">
                    </path>
                </svg>
            </div>

            <!-- Center Navigation -->
            <div class="flex items-center gap-4 relative">
                <button id="btnPrevHUD"
                    class="w-9 h-9 flex items-center justify-center rounded-full border border-gray-600 hover:bg-gray-700 hover:border-gray-500 transition"><svg
                        class="w-4 h-4 ml-[-2px]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7">
                        </path>
                    </svg></button>
                <div class="flex flex-col items-center justify-center w-24">
                    <span id="current-slide-label" class="text-xs text-gray-400 font-medium">Slide 1 of 14</span>
                    <div class="w-full h-0.5 bg-gray-500 mt-[2px]"></div>
                </div>
                <button id="btnNextHUD"
                    class="w-9 h-9 flex items-center justify-center rounded-full border border-gray-600 hover:bg-gray-700 hover:border-gray-500 transition"><svg
                        class="w-4 h-4 ml-[2px]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                    </svg></button>
            </div>
        </div>
    </div>

    <!-- RIGHT PANEL: Next Slide & Notes -->
    <div class="w-[35%] h-full border-l border-[#333] flex flex-col p-4">

        <!-- Next Slide Area -->
        <div class="h-[35%] flex flex-col mb-4 min-h-[220px]">
            <div class="flex justify-between items-center mb-2">
                <span id="next-slide-label" class="text-sm text-gray-400 tracking-wide block">Next slide</span>
            </div>
            <div
                class="flex-1 bg-black w-full h-full flex items-center justify-center relative rounded-lg border border-[#333]">
                <div id="next-slide-preview-container"
                    class="w-full h-full flex items-center justify-center bg-white text-black text-[8px] overflow-hidden opacity-90">
                    <div class="text-slate-400 text-sm">Loading Next...</div>
                </div>
            </div>
        </div>

        <div class="w-full border-b border-[#333] my-2"></div>

        <!-- Speaker Notes Area -->
        <div class="flex-1 flex flex-col relative pb-8">
            <span class="text-xs text-[#a3a3a3] mb-2 pt-2 tracking-wide font-semibold">Speaker Notes</span>

            <div id="speaker-notes-content"
                class="flex-1 overflow-y-auto text-xl leading-relaxed text-[#f5f5f5] mt-2 select-text p-2">
                <!-- Notes injected here -->
            </div>

            <!-- Font Resizer -->
            <div class="absolute bottom-0 left-0 w-full flex justify-start gap-4 text-[#a3a3a3] pt-4 bg-[#1a1a1a]">
                <button id="btn-font-dec"
                    class="hover:text-white transition-colors cursor-pointer text-sm font-serif">A-</button>
                <button id="btn-font-inc"
                    class="hover:text-white transition-colors cursor-pointer text-lg font-serif">A+</button>
            </div>
        </div>
    </div>
</div>
